version: "3.9"

services:

  # ── Backend API + WebSocket server ──────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: agentdash-server
    ports:
      - "4242:4242"
    volumes:
      - agentdash-data:/data
    environment:
      PORT: 4242
      DATA_DIR: /data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4242/stats"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── React dashboard ──────────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: agentdash-dashboard
    ports:
      - "3000:3000"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

# ── Persistent volume for SQLite ─────────────────────────────────────────────
volumes:
  agentdash-data:
    driver: local
